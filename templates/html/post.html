<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$title$</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header class="site-nav">
        <a href="$if(backlink)$$backlink$$else$./index.html$endif$">← $if(backlabel)$$backlabel$$else$Back$endif$</a>
    </header>
    <main>
        <article>
            $if(type)$<div class="post-type">$type$</div>$endif$
            <h1 class="post-title">$title$</h1>
            <div class="post-meta">
                $if(author)$<span class="author">$author$</span>$endif$
                $if(date)$<span class="date">$date$</span>$endif$
            </div>
            <div class="post-body">
                $body$
            </div>
        </article>
    </main>
</body>
</html>
